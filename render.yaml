services:
  - type: web
    name: zero-gravity
    runtime: docker
    region: oregon
    plan: starter        # Starter ($7/mo) required for persistent disk
    disk:
      name: zero-gravity-storage
      mountPath: /rails/storage
      sizeGB: 1
    envVars:
      - key: RAILS_MASTER_KEY
        sync: false       # Render will prompt you to paste the value from config/master.key
